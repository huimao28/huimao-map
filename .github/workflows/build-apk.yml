name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Restore fixed release keystore
        env:
          HUIMAO_KEYSTORE_BASE64: ${{ secrets.HUIMAO_KEYSTORE_BASE64 }}
        run: |
          test -n "$HUIMAO_KEYSTORE_BASE64"
          mkdir -p keystore
          printf '%s' "$HUIMAO_KEYSTORE_BASE64" | base64 --decode > keystore/release.jks

      - name: Build release APK
        env:
          HUIMAO_KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.jks
          HUIMAO_KEYSTORE_PASSWORD: ${{ secrets.HUIMAO_KEYSTORE_PASSWORD }}
          HUIMAO_KEY_PASSWORD: ${{ secrets.HUIMAO_KEYSTORE_PASSWORD }}
          HUIMAO_KEY_ALIAS: release
        run: gradle assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiduNaviAuto-fixed-release-apk
          path: app/build/outputs/apk/release/*.apk
