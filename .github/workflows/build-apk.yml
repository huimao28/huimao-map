name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Restore fixed release keystore
        env:
          HUIMAO_KEYSTORE_BASE64: ${{ secrets.HUIMAO_KEYSTORE_BASE64 }}
        run: |
          test -n "$HUIMAO_KEYSTORE_BASE64"
          mkdir -p keystore
          printf '%s' "$HUIMAO_KEYSTORE_BASE64" | base64 --decode > keystore/release.jks

      - name: Build release APKs
        env:
          HUIMAO_KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.jks
          HUIMAO_KEYSTORE_PASSWORD: ${{ secrets.HUIMAO_KEYSTORE_PASSWORD }}
          HUIMAO_KEY_PASSWORD: ${{ secrets.HUIMAO_KEYSTORE_PASSWORD }}
          HUIMAO_KEY_ALIAS: release
        run: |
          gradle :app:assembleRelease :redirector:assembleRelease \
            -PproxyPackage=com.baidu.BaiduMap -PproxyType=baidu --stacktrace
          mkdir -p release-files
          cp app/build/outputs/apk/release/app-release.apk release-files/HuimaoMap_${GITHUB_REF_NAME#v}.apk
          cp "$(find redirector/build/outputs/apk/release -name '*-release.apk' | head -1)" release-files/WeChatRedirect_Baidu_${GITHUB_REF_NAME#v}.apk
          gradle :redirector:clean :redirector:assembleRelease \
            -PproxyPackage=com.autonavi.minimap -PproxyType=amap --stacktrace
          cp "$(find redirector/build/outputs/apk/release -name '*-release.apk' | head -1)" release-files/WeChatRedirect_AMap_${GITHUB_REF_NAME#v}.apk
          gradle :redirector:clean :redirector:assembleRelease \
            -PproxyPackage=com.tencent.map -PproxyType=tencent --stacktrace
          cp "$(find redirector/build/outputs/apk/release -name '*-release.apk' | head -1)" release-files/WeChatRedirect_Tencent_${GITHUB_REF_NAME#v}.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HuimaoMap-and-Redirectors
          path: release-files/*.apk

      - name: Validate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          test -s RELEASE_NOTES.md
          ! grep -q '待填写' RELEASE_NOTES.md
          grep -q '## 修复内容' RELEASE_NOTES.md
          grep -q '## 已知问题' RELEASE_NOTES.md

      - name: Prepare tagged release files
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp release-files/HuimaoMap_${VERSION}.apk "HuimaoMap_${VERSION}.apk"
          cp release-files/WeChatRedirect_Baidu_${VERSION}.apk "WeChatRedirect_Baidu_${VERSION}.apk"
          cp release-files/WeChatRedirect_AMap_${VERSION}.apk "WeChatRedirect_AMap_${VERSION}.apk"
          cp release-files/WeChatRedirect_Tencent_${VERSION}.apk "WeChatRedirect_Tencent_${VERSION}.apk"
          git archive --format=zip --output="HuimaoMap_${VERSION}_full_source.zip" HEAD

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          append_body: false
          generate_release_notes: false
          files: |
            HuimaoMap_*.apk
            WeChatRedirect_Baidu_*.apk
            WeChatRedirect_AMap_*.apk
            WeChatRedirect_Tencent_*.apk
            HuimaoMap_*_full_source.zip
